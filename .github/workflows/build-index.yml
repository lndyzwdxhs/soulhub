name: Build Registry Index

on:
  push:
    branches: [main]
    paths:
      - 'registry/agents/**'
      - 'registry/recipes/**'
      - 'registry/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'registry/agents/**'
      - 'registry/recipes/**'

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install registry dependencies
        run: |
          cd registry
          npm install js-yaml

      - name: Validate agent templates
        run: node registry/scripts/validate.js

      - name: Build index.json
        run: node registry/scripts/build-index.js

      - name: Check for index changes
        id: check
        run: |
          if git diff --quiet registry/index.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated index
        if: steps.check.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry/index.json
          git commit -m "chore: rebuild registry index"
          git push
