name: Validate Registry (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'registry/agents/**'
      - 'registry/recipes/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install registry dependencies
        run: |
          cd registry
          npm install js-yaml

      - name: Validate agent templates
        run: node registry/scripts/validate.js

      - name: Build index (dry-run)
        run: node registry/scripts/build-index.js

      - name: Package (dry-run)
        run: node registry/scripts/package.js

      - name: Verify dist output
        run: |
          echo "📦 打包产物预览:"
          find registry/dist -type f | head -50
          echo ""
          echo "✅ 验证通过，PR 合并后将自动发布到 COS"
