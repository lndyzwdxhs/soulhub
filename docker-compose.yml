# ============================================================
# SoulHub Docker Compose
# Next.js 应用 + Nginx 反向代理（HTTPS）
# ============================================================

services:
  # ---------- Next.js 应用 ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soulhub-app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    networks:
      - soulhub-net

  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:alpine
    container_name: soulhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书（从宿主机映射）
      - /etc/ssl/soulhub/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/ssl/soulhub/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - app
    networks:
      - soulhub-net

networks:
  soulhub-net:
    driver: bridge
